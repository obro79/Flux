global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ingestion
    static_configs:
      - targets: ["host.docker.internal:8001"]

  - job_name: consumer
    static_configs:
      - targets: ["host.docker.internal:8002"]

  - job_name: api
    static_configs:
      - targets: ["host.docker.internal:8000"]
